<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will You Be My Girlfriend? ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}
body{
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}
.card{
    background:#fff;
    padding:40px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
}
h1{
    color:#ff4081;
    margin-bottom:20px;
}
p{
    font-size:20px;
    margin-bottom:30px;
}
button{
    padding:12px 30px;
    font-size:18px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    margin:10px;
}
#yes{
    background:#28a745;
    color:white;
}
#no{
    background:#dc3545;
    color:white;
    position:absolute;
}
#message{
    margin-top:20px;
    font-size:24px;
    color:#e91e63;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="card">
<h1>❤️ Will You Be My Girlfriend? ❤️</h1>
<p>You make my life beautiful. Will you be my girlfriend?</p>

<button id="yes" onclick="yesClick()">Yes ❤️</button>
<button id="no" onmouseover="moveNo()">No 💔</button>

<div id="message"></div>
</div>

<script>
function yesClick(){
    document.getElementById("message").innerHTML =
    "🥰 Thank You! You made me the happiest person! ❤️";
}

function moveNo(){
    var btn=document.getElementById("no");
    btn.style.left=Math.random()*(window.innerWidth-120)+"px";
    btn.style.top=Math.random()*(window.innerHeight-60)+"px";
}
</script>

</body>
</html>
